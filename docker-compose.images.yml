services:
  postgres:
    image: postgres:16-alpine
    container_name: ascent-postgres
    environment:
      POSTGRES_USER: ascent
      POSTGRES_PASSWORD: ascent
      POSTGRES_DB: ascent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascent -d ascent"]
      interval: 5s
      timeout: 5s
      retries: 12

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.3
    container_name: ascent-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.3
    container_name: ascent-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    image: ${DOCKER_NAMESPACE:?DOCKER_NAMESPACE is required}/ascent:backend-${IMAGE_TAG:-v1}
    container_name: ascent-backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://ascent:ascent@postgres:5432/ascent
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      POSTGRES_USER: ascent
      POSTGRES_PASSWORD: ascent
      POSTGRES_DB: ascent
    ports:
      - "5000:5000"
    volumes:
      - ./base.sql:/app/base.sql:ro

  frontend:
    image: ${DOCKER_NAMESPACE:?DOCKER_NAMESPACE is required}/ascent:frontend-${IMAGE_TAG:-v1}
    container_name: ascent-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres-data:
